<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista Rápida</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2e">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1e1e2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 20px; }
    h1 { color: #4f8ef7; font-size: 1.4rem; text-align: center; margin-bottom: 4px; }
    .subtitulo { text-align: center; color: #888899; font-size: 0.85rem; margin-bottom: 16px; }
    .divider { border: none; border-top: 1px solid #4f8ef7; margin: 12px 0; }
    label { font-size: 0.85rem; color: #888899; display: block; margin-bottom: 6px; }
    textarea { width: 100%; height: 280px; background: #3a3a50; color: #fff; border: 1px solid #2a2a3d; border-radius: 8px; padding: 12px; font-size: 1rem; font-family: 'Segoe UI', sans-serif; resize: none; outline: none; line-height: 1.6; }
    textarea:focus { border-color: #4f8ef7; }
    .contador { text-align: right; font-size: 0.8rem; color: #888899; margin-top: 6px; margin-bottom: 12px; }
    button { width: 100%; padding: 16px; background: #4f8ef7; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    button:active { background: #3a6fd8; }
    button:disabled { background: #444; cursor: not-allowed; }
    .status { margin-top: 14px; padding: 12px; border-radius: 8px; text-align: center; font-size: 0.95rem; display: none; }
    .status.ok { background: #1a3a2a; color: #4caf87; border: 1px solid #4caf87; display: block; }
    .status.error { background: #3a1a1a; color: #e74c3c; border: 1px solid #e74c3c; display: block; }
    .status.cargando { background: #1a2a3a; color: #4f8ef7; border: 1px solid #4f8ef7; display: block; }
    .preview { margin-top: 14px; background: #2a2a3d; border-radius: 8px; padding: 12px; display: none; }
    .preview h3 { color: #4f8ef7; font-size: 0.9rem; margin-bottom: 8px; }
    .preview-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #3a3a50; font-size: 0.9rem; }
    .preview-item:last-child { border-bottom: none; }
    .cant { color: #4f8ef7; font-weight: bold; min-width: 30px; }
  </style>
</head>
<body>
  <h1>📋 Lista Rápida</h1>
  <p class="subtitulo">Cruces Manuel 2026</p>
  <hr class="divider">
  <label>Pega o escribe tu lista (cantidad primero):</label>
  <textarea id="lista" placeholder="3 racks de 47 pulgadas&#10;1 moledor de hielo&#10;6 raquetas redondas"></textarea>
  <div class="contador" id="contador">0 líneas detectadas</div>
  <button id="btn" onclick="previsualizar()">💾 Vista previa y guardar</button>
  <div class="status" id="status"></div>
  <div class="preview" id="preview"></div>

  <script>
    const URL_API = "https://script.google.com/macros/s/AKfycbzs0LLA3KMTwQmks3MXqpDXTLKi7KBE0OTSYA55r0LR6FX8w2g1rBakHjWKVY_kM0iZ/exec";

    const textarea = document.getElementById("lista");
    const contador = document.getElementById("contador");
    const status   = document.getElementById("status");
    const preview  = document.getElementById("preview");
    const btn      = document.getElementById("btn");

    textarea.addEventListener("input", actualizarContador);

    function actualizarContador() {
      contador.textContent = parsear().length + " líneas detectadas";
    }

    function parsear() {
      return textarea.value
        .split("\n")
        .map(l => l.trim())
        .filter(l => l.length > 0)
        .map(linea => {
          const match = linea.match(/^(\d+\.?\d*)\s+(.+)$/);
          return match
            ? { cantidad: match[1], articulo: match[2].trim() }
            : { cantidad: "", articulo: linea };
        });
    }

    let articulosConfirmados = null;
    let esperandoConfirmacion = false;

    function previsualizar() {
      const articulos = parsear();
      if (articulos.length === 0) {
        mostrarStatus("Escribe al menos un artículo.", "error");
        return;
      }
      if (!esperandoConfirmacion) {
        articulosConfirmados = articulos;
        esperandoConfirmacion = true;
        preview.innerHTML = "<h3>✅ " + articulos.length + " artículo(s) a guardar:</h3>" +
          articulos.map(a =>
            '<div class="preview-item"><span>' + a.articulo + '</span><span class="cant">' + a.cantidad + 'x</span></div>'
          ).join("");
        preview.style.display = "block";
        btn.textContent = "✔ Confirmar y guardar";
        btn.style.background = "#27ae60";
        mostrarStatus("Revisa la lista y confirma para guardar.", "cargando");
      } else {
        guardar(articulosConfirmados);
        esperandoConfirmacion = false;
        btn.textContent = "💾 Vista previa y guardar";
        btn.style.background = "#4f8ef7";
        preview.style.display = "none";
      }
    }

    async function guardar(articulos) {
      btn.disabled = true;
      mostrarStatus("⏳ Guardando en Google Sheets...", "cargando");

      const fecha = new Date().toLocaleDateString("es-MX", {
        day: "2-digit", month: "2-digit", year: "numeric"
      });

      try {
        const payload = encodeURIComponent(JSON.stringify({ fecha, articulos }));
        const url = URL_API + "?datos=" + payload;

        // Usamos no-cors para evitar bloqueo, con imagen oculta como truco
        await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = resolve;
          img.onerror = resolve; // Google redirige, da error de imagen pero SÍ ejecuta el script
          img.src = url;
          setTimeout(resolve, 4000); // máximo 4 segundos de espera
        });

        mostrarStatus("✅ " + articulos.length + " artículo(s) guardados correctamente.", "ok");
        textarea.value = "";
        contador.textContent = "0 líneas detectadas";

      } catch (err) {
        mostrarStatus("❌ Error inesperado: " + err.message, "error");
      }

      btn.disabled = false;
    }

    function mostrarStatus(msg, tipo) {
      status.textContent = msg;
      status.className = "status " + tipo;
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
